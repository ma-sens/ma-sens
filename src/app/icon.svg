  <rect x="30" y="60" width="3" height="22" fill="#ffffff"/><!-- short  -->
  <rect x="41" y="60" width="3" height="22" fill="#ffffff"/><!-- short  -->
  <rect x="52" y="40" width="4" height="42" fill="#ffffff"/><!-- middle -->
  <rect x="63" y="60" width="3" height="22" fill="#ffffff"/><!-- short  -->
  <rect x="74" y="60" width="3" height="22" fill="#ffffff"/><!-- short  -->
  <rect x="85" y="60" width="3" height="22" fill="#ffffff"/><!-- short  -->
